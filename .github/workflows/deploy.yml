name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Start PHP server
        run: php -S localhost:8080 &

      - name: Wait for server
        run: sleep 5

      - name: Download pages
        run: |
          mkdir -p dist
          for file in $(find templates -name "*.twig" -exec basename {} .twig \;); do
            echo "Rendering $file..."
            wget -q "http://localhost:8080/$file" -O "dist/$file.html"
          done
          cp -r assets dist/assets


      - name: Fix localhost links
        run: |
          find dist -type f -name "*.html" -exec sed -i 's|http://localhost:8080/|/|g' {} \;

      - name: Normalize asset paths
        run: |
          find dist -type f -name "*.html" -exec sed -i 's|[/\\\+\*]*assets|assets|g' {} \;
      - name: Verify asset paths
        run: |
          grep -R "assets/" dist/*.html || (echo "❌ Assets path not fixed!" && exit 1)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Confirm deploy
        run: |
          echo "✅ Deploy complete. GitHub Pages обновится в течение 5–15 минут."
          echo "Содержимое папки dist:"
          ls -R dist