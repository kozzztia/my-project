name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install

      - name: Start PHP server
        run: php -S localhost:8080 &

      - name: Wait for server
        run: sleep 5

      - name: Download pages
        run: |
          mkdir -p dist
          wget -q http://localhost:8080 -O dist/index.html
          wget -q http://localhost:8080/about -O dist/about.html
          wget -q http://localhost:8080/projects -O dist/projects.html
          wget -q http://localhost:8080/graphics -O dist/graphics.html
          cp -r assets dist/assets

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
