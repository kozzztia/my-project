name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Start PHP server
        run: php -S localhost:8080 &

      - name: Wait for server
        run: sleep 5

      - name: Clean dist folder
        run: rm -rf dist && mkdir dist

      - name: Download all twig pages
        run: |
          for file in $(find templates -name "*.twig" -exec basename {} .twig \;); do
            echo "Rendering $file..."
            wget -q "http://localhost:8080/$file" -O "dist/$file.html"
          done
          wget -q http://localhost:8080 -O dist/index.html
          cp -r assets dist/assets

      - name: Replace base URL everywhere
        run: |
          BASE_URL="https://kozzztia.github.io/my-project"
          # HTML
          find dist -type f -name "*.html" -exec sed -i "
            s|http://localhost:[0-9]\+|$BASE_URL|g;
            s|href=\"/|href=\"$BASE_URL/|g;
            s|src=\"/|src=\"$BASE_URL/|g;
            s|/assets/svg|$BASE_URL/assets/svg|g
          " {} \;
          # CSS
          find dist -type f -name "*.css" -exec sed -i "
            s|url(/assets|url($BASE_URL/assets|g
          " {} \;

      - name: Verify asset paths
        run: |
          if grep -R "localhost" dist/*.html; then
            echo "⚠️ Найдены ссылки на localhost!"
          else
            echo "✅ Нет ссылок на localhost."
          fi
          if grep -R "href=\"/assets" dist/*.html || grep -R "src=\"/assets" dist/*.html; then
            echo "⚠️ Найдены относительные ссылки на /assets!"
          else
            echo "✅ Все ссылки на assets абсолютные."
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Confirm deploy
        run: |
          echo "✅ Deploy complete. GitHub Pages обновится в течение 5–15 минут."
          echo "Содержимое папки dist:"
          ls -R dist