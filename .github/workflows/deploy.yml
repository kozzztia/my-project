name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Start PHP server
        run: php -S localhost:8080 &

      - name: Wait for server
        run: sleep 5

      - name: Clean dist folder
        run: rm -rf dist && mkdir dist

      - name: Download all twig pages
        run: |
          for file in $(find templates -name "*.twig" -exec basename {} .twig \;); do
            echo "Rendering $file..."
            wget -q "http://localhost:8080/$file" -O "dist/$file.html"
          done
          wget -q http://localhost:8080 -O dist/index.html
          cp -r assets dist/assets

      - name: Replace base URL everywhere
        run: |
          BASE_URL="https://kozzztia.github.io/my-project"

          # HTML файлы
          find dist -type f -name "*.html" -exec sed -i \
            -e "s|http://localhost:[0-9]*|$BASE_URL|g" \
            -e "s|href=\"/|href=\"$BASE_URL/|g" \
            -e "s|src=\"/|src=\"$BASE_URL/|g" \
            -e "s|url(/assets|url($BASE_URL/assets|g" \
            {} \;

          # CSS файлы
          find dist -type f -name "*.css" -exec sed -i \
            -e "s|http://localhost:[0-9]*|$BASE_URL|g" \
            -e "s|url(/assets|url($BASE_URL/assets|g" \
            -e "s|url('http://localhost:[0-9]*/assets|url('$BASE_URL/assets|g" \
            -e "s|url(\"http://localhost:[0-9]*/assets|url(\"$BASE_URL/assets|g" \
            {} \;

          # Убираем двойной BASE_URL если вдруг появился
          ESCAPED=$(echo "$BASE_URL" | sed 's|/|\\/|g')
          find dist -type f \( -name "*.html" -o -name "*.css" \) -exec sed -i \
            -e "s|${ESCAPED}${ESCAPED}|$BASE_URL|g" \
            {} \;

      - name: Create extensionless page copies (for clean URLs)
        run: |
          # Создаём папки с index.html для чистых URL (/projects вместо /projects.html)
          find dist -maxdepth 1 -name "*.html" ! -name "index.html" | while read f; do
            name=$(basename "$f" .html)
            mkdir -p "dist/$name"
            cp "$f" "dist/$name/index.html"
          done

      - name: Fix internal links to use clean URLs
        run: |
          BASE_URL="https://kozzztia.github.io/my-project"
          # Заменяем ссылки вида href="...page.html" на href=".../page"
          find dist -type f -name "*.html" -exec sed -i \
            -e "s|href=\"$BASE_URL/\([^\"]*\)\.html\"|href=\"$BASE_URL/\1\"|g" \
            {} \;

      - name: Verify asset paths
        run: |
          echo "=== Проверка localhost ==="
          if grep -Rn "localhost" dist/*.html 2>/dev/null | head -5; then
            echo "⚠️ Найдены ссылки на localhost!"
          else
            echo "✅ Нет ссылок на localhost."
          fi

          echo "=== Проверка двойного BASE_URL ==="
          if grep -Rn "my-projecthttps" dist/*.html 2>/dev/null | head -5; then
            echo "⚠️ Найден двойной BASE_URL!"
          else
            echo "✅ Двойных URL нет."
          fi

          echo "=== Проверка относительных /assets ==="
          if grep -Rn "href=\"/assets\|src=\"/assets" dist/*.html 2>/dev/null | head -5; then
            echo "⚠️ Найдены относительные ссылки на /assets!"
          else
            echo "✅ Все ссылки на assets абсолютные."
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Confirm deploy
        run: |
          echo "✅ Deploy complete."
          echo "Структура dist:"
          ls -R dist